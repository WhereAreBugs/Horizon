services:
  horizon:
    build: .
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=UTC
    ports:
      - "127.0.0.1:8088:8088"
    restart: unless-stopped
    # Long-running daemon: Telegram callback HTTP service + configurable scheduler.
    # For one-time run, use: docker compose run --rm horizon horizon --hours 24
    command: ["horizon-daemon"]

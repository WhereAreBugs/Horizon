services:
  horizon:
    build: .
    container_name: horizon
    env_file:
      - .env
    volumes:
      - ${HORIZON_DATA_VOLUME:-./data}:/app/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    entrypoint: ["uv", "run"]
    # Long-running daemon: scheduler only in Cloudflare Worker gateway mode.
    # For one-time run, use: docker compose run --rm horizon horizon --hours 24
    command: ["python", "-m", "src.services.daemon"]
